<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>懶人報 — 快速生成報告網頁</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F7F5F0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="懶人報">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F7F5F0; --ink: #1A1A1B; --brand: #3E5C76; --glass: rgba(255, 255, 255, 0.7); }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--ink); 
            font-family: 'Inter', sans-serif; width: 100%; min-height: 100%;
            overflow-x: hidden;
        }
        
        .serif { font-family: 'Newsreader', serif; }
        .generative-bg { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; 
            background: radial-gradient(circle at 10% 10%, rgba(168, 192, 255, 0.1) 0%, transparent 40%); 
            filter: blur(80px); 
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-btn {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.4);
            color: var(--brand); padding: 14px 24px; border-radius: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .glass-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.9); }
        .primary-btn {
            background: var(--brand); color: white; border: none;
            padding: 16px 32px; border-radius: 18px; font-weight: 700;
            box-shadow: 0 10px 30px rgba(62, 92, 118, 0.2);
            cursor: pointer;
        }

        .custom-scroll::-webkit-scrollbar { width: 0; height: 0; }

        @media print {
            .no-print { display: none !important; }
            body, html { position: static !important; overflow: visible !important; background: white !important; height: auto !important; }
            .app-container { width: 100% !important; height: auto !important; position: static !important; overflow: visible !important; box-shadow: none !important; border-radius: 0 !important; display: block !important; margin: 0 !important; }
            .content-area { padding: 0 !important; width: 100% !important; overflow: visible !important; height: auto !important; display: block !important; }
            .custom-scroll { overflow: visible !important; height: auto !important; }
            h2.serif { page-break-before: always; padding-top: 40px; }
            h2.serif:first-child { page-break-before: avoid; }
        }

        /* Mobile Specific Shell */
        @media (max-width: 768px) {
            .app-container { width: 100vw !important; height: 100vh !important; border-radius: 0 !important; }
            .mobile-nav-bar {
                position: fixed; bottom: 24px; left: 20px; right: 20px;
                height: 64px; background: rgba(255,255,255,0.85);
                backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
                border-radius: 22px; border: 1px solid rgba(255,255,255,0.5);
                display: flex; align-items: center; padding: 0 12px;
                overflow-x: auto; scroll-snap-type: x mandatory;
                box-shadow: 0 15px 40px rgba(0,0,0,0.1); z-index: 2000;
            }
            .mobile-nav-item {
                padding: 10px 18px; font-size: 13px; color: #888;
                white-space: nowrap; transition: 0.3s; scroll-snap-align: start;
            }
            .mobile-nav-item.active { color: var(--brand); font-weight: 700; background: rgba(62, 92, 118, 0.1); border-radius: 12px; }
            .content-area { padding: 40px 24px 140px !important; touch-action: pan-y; overflow-x: hidden; }
            .mobile-top-tools {
                position: fixed; top: env(safe-area-inset-top, 20px); right: 20px; z-index: 2000;
                display: flex; gap: 8px;
            }
            .section-anchor { scroll-margin-top: 100px; }
        }
    </style>
</head>
<body>
    <div class="generative-bg no-print"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function MetricGrid({ metrics }) {
            return (
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '12px', margin: '24px 0'}}>
                    {metrics.map((m, i) => (
                        <div key={i} style={{background: 'white', padding: '16px', borderRadius: '20px', border: '1px solid #F0F0F0', textAlign: 'center', boxShadow: '0 4px 15px rgba(0,0,0,0.02)'}}>
                            <div style={{fontSize: '9px', color: '#BBB', fontWeight: 700, letterSpacing: '1px', marginBottom: '6px', textTransform: 'uppercase'}}>{m.label}</div>
                            <div style={{fontSize: '22px', fontWeight: 600, color: m.trend === 'up' ? '#D9534F' : m.trend === 'down' ? '#5CB85C' : 'var(--brand)'}}>
                                {m.value}<span style={{fontSize: '12px', marginLeft: '2px'}}>{m.trend === 'up' ? '+' : m.trend === 'down' ? '-' : ''}</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function FlowStep({ steps }) {
            return (
                <div style={{display: 'flex', flexDirection: 'column', gap: '16px', margin: '32px 0'}}>
                    {steps.map((s, i) => (
                        <div key={i} style={{display: 'flex', gap: '20px', alignItems: 'flex-start'}}>
                            <div style={{width: '32px', height: '32px', background: 'var(--brand)', color: 'white', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, flexShrink: 0, fontSize: '12px'}}>{i+1}</div>
                            <div style={{flex: 1, background: 'white', padding: '20px 24px', borderRadius: '20px', border: '1px solid #F0F0F0', boxShadow: '0 4px 15px rgba(0,0,0,0.02)'}}>
                                <div style={{fontWeight: 700, color: 'var(--brand)', fontSize: '17px'}}>{s.action}</div>
                                <div style={{color: '#666', fontSize: '15px', marginTop: '6px', lineHeight: 1.6}}>{s.impact}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function AdaptiveContent({ data }) {
            if (!data) return null;
            if (typeof data === 'string') return <p style={{lineHeight: 1.9, fontSize: '18px', color: '#444', margin: '20px 0'}}>{data}</p>;
            return (
                <div>
                    {data.quote && (
                        <div style={{padding: '32px', background: 'rgba(62, 92, 118, 0.04)', borderRadius: '28px', borderLeft: '6px solid var(--brand)', margin: '40px 0'}}>
                            <div className="serif" style={{fontSize: '22px', fontStyle: 'italic', color: 'var(--brand)', lineHeight: 1.6}}>"{data.quote}"</div>
                            {data.author && <div style={{marginTop: '16px', textAlign: 'right', fontSize: '14px', color: '#888', fontWeight: 600}}>— {data.author}</div>}
                        </div>
                    )}
                    {data.metrics && <MetricGrid metrics={data.metrics} />}
                    {data.steps && <FlowStep steps={data.steps} />}
                    {Object.entries(data).map(([key, value], i) => {
                        const reserved = ['quote', 'author', 'metrics', 'steps', 'type', 'title'];
                        if (reserved.includes(key)) return null;
                        return (
                            <div key={i} style={{marginTop: '24px'}}>
                                <div style={{fontSize: '11px', fontWeight: 800, color: 'var(--brand)', textTransform: 'uppercase', marginBottom: '8px', opacity: 0.4}}>{key}</div>
                                <AdaptiveContent data={value} />
                            </div>
                        );
                    })}
                </div>
            );
        }

        function OutputStage({ data, onReset }) {
            const [active, setActive] = useState(0);
            const contentRef = useRef(null);
            const sectionRefs = useRef([]);
            const isManualScrolling = useRef(false);

            useEffect(() => {
                const handleScroll = () => {
                    if (isManualScrolling.current) return;
                    const container = contentRef.current;
                    if (!container) return;
                    const scrollPos = container.scrollTop + 150;
                    const index = sectionRefs.current.findIndex((ref, i) => {
                        if (!ref) return false;
                        const nextRef = sectionRefs.current[i + 1];
                        if (nextRef) return scrollPos >= ref.offsetTop && scrollPos < nextRef.offsetTop;
                        return scrollPos >= ref.offsetTop;
                    });
                    if (index !== -1 && index !== active) setActive(index);
                };
                contentRef.current?.addEventListener('scroll', handleScroll);
                return () => contentRef.current?.removeEventListener('scroll', handleScroll);
            }, [active]);

            useEffect(() => {
                const navBar = document.querySelector('.mobile-nav-bar');
                if (navBar && navBar.children[active]) {
                    const activeItem = navBar.children[active];
                    const scrollLeft = activeItem.offsetLeft - (navBar.clientWidth / 2) + (activeItem.clientWidth / 2);
                    navBar.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }, [active]);

            const scrollToSection = (i) => {
                isManualScrolling.current = true;
                setActive(i);
                // Increased offset to prevent title clipping
                contentRef.current.scrollTo({ top: sectionRefs.current[i].offsetTop - 80, behavior: 'smooth' });
                setTimeout(() => { isManualScrolling.current = false; }, 800);
            };

            return (
                <div style={{flex: 1, width: '100%', display: 'flex', position: 'relative', overflow: 'hidden'}}>
                    {/* Desktop Sidebar */}
                    <div className="no-print" style={{ width: window.innerWidth < 768 ? '0' : '280px', borderRight: '1px solid #F0F0F0', background: '#fff', padding: '50px 24px', display: window.innerWidth < 768 ? 'none' : 'flex', flexDirection: 'column', gap: '32px' }}>
                        <h4 style={{fontSize: '10px', fontWeight: 700, color: '#CCC', letterSpacing: '2px', textTransform: 'uppercase'}}>內容導航</h4>
                        {data.sections.map((s, i) => (
                            <div key={i} onClick={() => scrollToSection(i)} style={{ fontSize: '14px', color: i === active ? 'var(--brand)' : '#888', fontWeight: i === active ? 700 : 400, cursor: 'pointer', padding: '12px 16px', borderRadius: '12px', background: i === active ? 'rgba(62, 92, 118, 0.05)' : 'transparent' }}>{s.title}</div>
                        ))}
                        <div style={{marginTop: 'auto'}}>
                            <button onClick={() => window.print()} className="glass-btn" style={{width: '100%', marginBottom: '12px'}}>PDF Export</button>
                            <button onClick={onReset} className="glass-btn" style={{width: '100%'}}>Back</button>
                        </div>
                    </div>

                    {/* Mobile Floating Nav */}
                    <div className="mobile-nav-bar no-print custom-scroll">
                        {data.sections.map((s, i) => (
                            <div key={i} onClick={() => scrollToSection(i)} className={`mobile-nav-item ${i === active ? 'active' : ''}`}>{s.title}</div>
                        ))}
                    </div>
                    <div className="mobile-top-tools no-print">
                        <div onClick={onReset} className="glass-btn" style={{padding: '10px', borderRadius: '12px', minWidth: '44px'}}>Back</div>
                        <div onClick={() => window.print()} className="glass-btn" style={{padding: '10px', borderRadius: '12px', minWidth: '44px'}}>PDF</div>
                    </div>

                    {/* Content Area */}
                    <div ref={contentRef} className="custom-scroll content-area" style={{ flex: 1, overflowY: 'auto', background: '#FDFDFD' }}>
                        {data.sections.map((s, i) => (
                            <div key={i} ref={el => sectionRefs.current[i] = el} className="section-anchor" style={{marginBottom: '100px', animation: 'fadeIn 0.8s ease-out'}}>
                                <h2 className="serif" style={{fontSize: '32px', color: 'var(--brand)', marginBottom: '32px'}}>{s.title}</h2>
                                <AdaptiveContent data={s.content} />
                            </div>
                        ))}
                        <div className="no-print" style={{height: '300px'}} />
                    </div>
                </div>
            );
        }

        function InputStage({ onInject }) {
            const [inputText, setInputText] = useState(localStorage.getItem('lazy_input') || '');
            const [jsonText, setJsonText] = useState(localStorage.getItem('lazy_json') || '');

            useEffect(() => {
                localStorage.setItem('lazy_input', inputText);
                localStorage.setItem('lazy_json', jsonText);
            }, [inputText, jsonText]);

            return (
                <div style={{padding: window.innerWidth < 768 ? '40px 24px' : '60px 80px', flex: 1, display: 'flex', flexDirection: 'column', gap: '32px', overflowY: 'auto', overflowX: 'hidden'}} className="custom-scroll">
                    <h1 className="serif" style={{fontSize: '48px', margin: 0, fontWeight: 400}}>下午好。</h1>
                    <div style={{display: 'flex', flexDirection: window.innerWidth < 768 ? 'column' : 'row', gap: '32px', flex: 1, minHeight: 0}}>
                        <div style={{flex: 1, display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            <textarea value={inputText} onChange={e => setInputText(e.target.value)} style={{ flex: 1, border: '1px solid rgba(0,0,0,0.05)', borderRadius: '28px', padding: '32px', fontSize: '17px', outline: 'none', background: 'white', boxShadow: '0 10px 40px rgba(0,0,0,0.02)' }} placeholder="貼入原始素材..." />
                            <button onClick={() => { navigator.clipboard.writeText(`你是一位資深的「懶人報」內容架構師... (下略)\n\n${inputText}`); alert('指令已複製！'); }} className="glass-btn">Copy AI Prompt</button>
                        </div>
                        <div style={{width: window.innerWidth < 768 ? '100%' : '420px', display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            <textarea value={jsonText} onChange={e => setJsonText(e.target.value)} style={{ flex: 1, background: '#F8F8F8', border: '1px dashed rgba(0,0,0,0.1)', borderRadius: '28px', padding: '24px', fontSize: '13px', fontFamily: 'monospace', outline: 'none' }} placeholder="貼入 AI 解析結果..." />
                            <button onClick={() => onInject(jsonText)} className="primary-btn">Render Report</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [stage, setStage] = useState('input');
            const [data, setData] = useState(null);
            const handleInject = (str) => {
                try {
                    let parsed = JSON.parse(str);
                    if (!parsed.sections) parsed = { sections: [{ title: "Analysis Report", content: parsed }] };
                    setData(parsed); setStage('output');
                } catch (e) { alert('JSON Format Error'); }
            };
            return (
                <div className="app-container" style={{ display: 'flex', flexDirection: 'column', background: '#fff', borderRadius: '24px', overflow: 'hidden', boxShadow: '0 50px 150px rgba(0,0,0,0.1)', width: '1350px', height: '900px', position: 'relative', maxWidth: '100vw', margin: 'auto' }}>
                    {stage === 'input' && <InputStage onInject={handleInject} />}
                    {stage === 'output' && <OutputStage data={data} onReset={() => setStage('input')} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
