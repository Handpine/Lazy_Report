                    }

        };

        // --- Core Visual Components ---

        // 1. Metric Grid Widget (with interactive trend toggle)
        function MetricGrid({ metrics, isEditing, onUpdate }) {
            const toggleTrend = (i) => {
                if (!isEditing) return;
                const trends = ['up', 'down', 'none'];
                const current = metrics[i].trend || 'none';
                const next = trends[(trends.indexOf(current) + 1) % trends.length];
                const newMetrics = [...metrics];
                newMetrics[i].trend = next;
                onUpdate(i, 'trend', next);
            };

            return (
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '16px', margin: '24px 0'}}>
                    {metrics.map((m, i) => (
                        <div key={i} className="metric-card" style={{background: 'white', padding: '24px', borderRadius: '24px', border: '1px solid #F0F0F0', textAlign: 'center', boxShadow: '0 4px 15px rgba(0,0,0,0.02)', cursor: 'default'}}>
                            <div 
                                className="editable-field"
                                contentEditable={isEditing}
                                onBlur={(e) => onUpdate(i, 'label', e.target.innerText)}
                                style={{fontSize: '10px', color: '#BBB', fontWeight: 700, letterSpacing: '1px', marginBottom: '8px', textTransform: 'uppercase'}}
                            >{m.label}</div>
                            <div style={{fontSize: '26px', fontWeight: 600, color: m.trend === 'up' ? '#D9534F' : m.trend === 'down' ? '#5CB85C' : 'var(--brand)'}}>
                                <span 
                                    className="editable-field"
                                    contentEditable={isEditing}
                                    onBlur={(e) => onUpdate(i, 'value', e.target.innerText)}
                                >{m.value}</span>
                                <span 
                                    onClick={() => toggleTrend(i)}
                                    style={{fontSize: '14px', marginLeft: '4px', cursor: isEditing ? 'pointer' : 'default', userSelect: 'none'}}
                                    title={isEditing ? "點擊切換趨勢方向" : ""}
                                >
                                    {m.trend === 'up' ? '↑' : m.trend === 'down' ? '↓' : '•'}
                                </span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 2. Flow Step Workflow Widget
        function FlowStep({ steps, isEditing, onUpdate }) {
            return (
                <div style={{display: 'flex', flexDirection: 'column', gap: '16px', margin: '32px 0'}}>
                    {steps.map((s, i) => (
                        <div key={i} style={{display: 'flex', gap: '20px', alignItems: 'flex-start'}}>
                            <div style={{width: '32px', height: '32px', background: 'var(--brand)', color: 'white', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, flexShrink: 0, fontSize: '12px'}}>{i+1}</div>
                            <div style={{flex: 1, background: 'white', padding: '20px 24px', borderRadius: '20px', border: '1px solid #F0F0F0', boxShadow: '0 4px 15px rgba(0,0,0,0.02)'}}>
                                <div 
                                    className="editable-field"
                                    contentEditable={isEditing}
                                    onBlur={(e) => onUpdate(i, 'action', e.target.innerText)}
                                    style={{fontWeight: 700, color: 'var(--brand)', fontSize: '17px'}}
                                >{s.action}</div>
                                <div 
                                    className="editable-field"
                                    contentEditable={isEditing}
                                    onBlur={(e) => onUpdate(i, 'impact', e.target.innerText)}
                                    style={{color: '#666', fontSize: '15px', marginTop: '6px', lineHeight: 1.6}}
                                >{s.impact}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 3. Bar Chart Widget
        function BarChart({ data, isEditing, onUpdate }) {
            if (!Array.isArray(data)) return null;
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px', margin: '24px 0' }}>
                    {data.map((item, i) => {
                        const pct = Math.min(100, Math.max(0, parseFloat(item.value) || 0));
                        return (
                            <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', fontWeight: 600 }}>
                                    <span 
                                        className="editable-field" 
                                        contentEditable={isEditing} 
                                        onBlur={(e) => {
                                            const newData = [...data];
                                            newData[i].label = e.target.innerText;
                                            onUpdate(newData);
                                        }}
                                        style={{ color: '#555' }}
                                    >{item.label}</span>
                                    <span style={{ color: 'var(--brand)' }}>
                                        <span 
                                            className="editable-field" 
                                            contentEditable={isEditing} 
                                            onBlur={(e) => {
                                                const newData = [...data];
                                                newData[i].value = parseFloat(e.target.innerText) || 0;
                                                onUpdate(newData);
                                            }}
                                        >{item.value}</span>
                                        <span 
                                            className="editable-field" 
                                            contentEditable={isEditing} 
                                            onBlur={(e) => {
                                                const newData = [...data];
                                                newData[i].unit = e.target.innerText;
                                                onUpdate(newData);
                                            }}
                                            style={{ fontSize: '12px', marginLeft: '2px', color: '#888' }}
                                        >{item.unit || ''}</span>
                                    </span>
                                </div>
                                <div style={{ height: '8px', width: '100%', background: 'var(--accent)', borderRadius: '4px', overflow: 'hidden' }} className="chart-bar-container">
                                    <div style={{ width: `${pct}%`, height: '100%', background: 'var(--brand)', borderRadius: '4px', transition: 'width 0.8s cubic-bezier(0.4, 0, 0.2, 1)' }} className="chart-bar-fill" />
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // 4. Premium Stacked Distribution Bar (extremely robust, high-fidelity, and 100% success rate)
        function DonutChart({ data, isEditing, onUpdate }) {
            if (!data) return null;
            const isArr = Array.isArray(data);
            const items = isArr ? data : (data.items || []);
            if (!Array.isArray(items) || items.length === 0) return null;
            
            const totalLabel = isArr ? '項目總計 (TOTAL)' : (data.totalLabel || '項目總計 (TOTAL)');
            const unit = isArr ? '單位' : (data.unit || '單位');
            const total = items.reduce((sum, item) => sum + (parseFloat(item.value) || 0), 0) || 1;
            
            const colors = [
                '#3E5C76', // Primary Blue
                '#5C7C96', // Slate Mid
                '#8CA0B0', // Steel Soft
                '#BDC9D4', // Gray-Blue
                '#E8E2D6', // Accent Sand
                '#A69E8F'  // Warm Clay
            ];

            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '20px', margin: '24px 0 32px 0', background: '#F8F9FA', padding: '24px', borderRadius: '16px', border: '1px solid rgba(0,0,0,0.04)', boxShadow: '0 4px 20px rgba(0,0,0,0.02)' }}>
                    {/* Header Summary Card */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', paddingBottom: '4px' }}>
                        <div style={{ display: 'flex', flexDirection: 'column' }}>
                            <span 
                                className="editable-field" 
                                contentEditable={isEditing} 
                                onBlur={(e) => {
                                    const newData = isArr ? { items: [...data], totalLabel: '項目總計 (TOTAL)', unit: '單位' } : { ...data };
                                    newData.totalLabel = e.target.innerText;
                                    onUpdate(newData);
                                }}
                                style={{ fontSize: '11px', color: '#888', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600, outline: 'none' }}
                            >{totalLabel}</span>
                            <span style={{ fontSize: '28px', fontWeight: 800, color: '#3E5C76', marginTop: '4px', letterSpacing: '-0.5px' }}>
                                {total.toFixed(0)} <span 
                                    className="editable-field" 
                                    contentEditable={isEditing} 
                                    onBlur={(e) => {
                                        const newData = isArr ? { items: [...data], totalLabel: '項目總計 (TOTAL)', unit: '單位' } : { ...data };
                                        newData.unit = e.target.innerText;
                                        onUpdate(newData);
                                    }}
                                    style={{ fontSize: '14px', color: '#666', fontWeight: 500, outline: 'none' }}
                                >{unit}</span>
                            </span>
                        </div>
                    </div>

                    {/* Stacked Distribution Bar */}
                    <div style={{ 
                        height: '28px', 
                        width: '100%', 
                        display: 'flex', 
                        borderRadius: '14px', 
                        overflow: 'hidden', 
                        background: '#ECEFF1',
                        boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.06)'
                    }}>
                        {items.map((item, idx) => {
                            const val = parseFloat(item.value) || 0;
                            const pct = (val / total) * 100;

        // 5. Line Chart Widget (aesthetic pure SVG vector trend)
        function LineChart({ data, isEditing, onUpdate }) {
            if (!Array.isArray(data) || data.length === 0) return null;
            
            const values = data.map(item => parseFloat(item.value) || 0);
            const maxVal = Math.max(...values, 1);
            const minVal = Math.min(...values, 0);
            const range = maxVal - minVal || 1;
            
            const width = 600;
            const height = 180;
            const paddingX = 40;
            const paddingY = 24;
            
            const points = data.map((item, idx) => {
                const x = paddingX + (idx / Math.max(1, data.length - 1)) * (width - 2 * paddingX);
                const y = height - paddingY - (((parseFloat(item.value) || 0) - minVal) / range) * (height - 2 * paddingY);
                return { x, y, label: item.label, value: item.value };
            });
            
            const linePath = points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaPath = points.length > 0 
                ? `${linePath} L ${points[points.length - 1].x} ${height - paddingY} L ${points[0].x} ${height - paddingY} Z`
                : '';
                
            return (
                <div style={{ margin: '24px 0', background: 'white', border: '1px solid #F0F0F0', padding: '24px', borderRadius: '24px', boxShadow: '0 4px 15px rgba(0,0,0,0.01)' }}>
                    <div style={{ position: 'relative', width: '100%', overflowX: 'auto' }} className="custom-scroll">
                        <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: 'auto', minWidth: '420px', display: 'block' }}>
                            <defs>
                                <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stopColor="var(--brand)" stopOpacity="0.12" />
                                    <stop offset="100%" stopColor="var(--brand)" stopOpacity="0.0" />
                                </linearGradient>
                            </defs>
                            
                            <line x1={paddingX} y1={paddingY} x2={width - paddingX} y2={paddingY} stroke="#F5F5F5" strokeWidth="1" />
                            <line x1={paddingX} y1={height / 2} x2={width - paddingX} y2={height / 2} stroke="#F5F5F5" strokeWidth="1" strokeDasharray="3 3" />
                            <line x1={paddingX} y1={height - paddingY} x2={width - paddingX} y2={height - paddingY} stroke="#EAEAEA" strokeWidth="1.5" />
                            
                            {areaPath && <path d={areaPath} fill="url(#area-grad)" />}
                            {linePath && <path d={linePath} fill="none" stroke="var(--brand)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />}
                            
                            {points.map((p, idx) => (
                                <g key={idx}>
                                    <circle cx={p.x} cy={p.y} r="4.5" fill="white" stroke="var(--brand)" strokeWidth="2" />
                                    <text x={p.x} y={p.y - 10} textAnchor="middle" fontSize="10" fontWeight="700" fill="var(--brand)">
                                        {p.value}
                                    </text>
                                </g>
                            ))}
                        </svg>
                    </div>
                    
                    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0 8px', marginTop: '16px', overflowX: 'auto', gap: '16px' }} className="custom-scroll">
                        {data.map((item, idx) => (
                            <div key={idx} style={{ textAlign: 'center', display: 'flex', flexDirection: 'column', gap: '2px', flexShrink: 0 }}>
                                <span 
                                    className="editable-field" 
                                    contentEditable={isEditing} 
                                    onBlur={(e) => {

        // --- Render Stages ---

        function OutputStage({ data: initialData, onReset }) {
            const [history, setHistory] = useState([initialData]);
            const [historyIndex, setHistoryIndex] = useState(0);
            const [active, setActive] = useState(0);
            const [isEditing, setIsEditing] = useState(false);
            const contentRef = useRef(null);
            const sectionRefs = useRef([]);
            const isManualScrolling = useRef(false);

            const data = history[historyIndex];

            const updateData = (newData) => {
                if (JSON.stringify(newData) === JSON.stringify(data)) return;
                const newHistory = history.slice(0, historyIndex + 1);
                newHistory.push(newData);
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
            };

            const handleUndo = () => {
                if (historyIndex > 0) {
                    setHistoryIndex(historyIndex - 1);
                }
            };

            const handleRedo = () => {
                if (historyIndex < history.length - 1) {
                    setHistoryIndex(historyIndex + 1);
                }
            };

            const updateSection = (idx, newData) => {
                const newSections = [...data.sections];
                newSections[idx] = newData;
                updateData({...data, sections: newSections});
            };

            // Keyboard shortcut support for Undo / Redo
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!isEditing) return;

                    // Ctrl + Z (or Cmd + Z on Mac)
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                        if (e.shiftKey) {
                            e.preventDefault();
                            handleRedo();
                        } else {
                            e.preventDefault();
                            handleUndo();
                        }
                    }
                    // Ctrl + Y (or Cmd + Y on Mac)
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                        e.preventDefault();
                        handleRedo();
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [historyIndex, history.length, isEditing]);

            useEffect(() => {
                const handleScroll = () => {
                    if (isManualScrolling.current) return;
                    const container = contentRef.current;
                    if (!container) return;
                    const scrollPos = container.scrollTop + 150;
                    const index = sectionRefs.current.findIndex((ref, i) => {
                        if (!ref) return false;
                        const nextRef = sectionRefs.current[i + 1];
                        if (nextRef) return scrollPos >= ref.offsetTop && scrollPos < nextRef.offsetTop;
                        return scrollPos >= ref.offsetTop;
                    });
                    if (index !== -1 && index !== active) setActive(index);
                };
                contentRef.current?.addEventListener('scroll', handleScroll);
                return () => contentRef.current?.removeEventListener('scroll', handleScroll);
            }, [active]);

            useEffect(() => {
                // Mobile navigation bar auto-scrolling spy
                const navBar = document.querySelector('.mobile-nav-bar');
                if (navBar && navBar.children[active]) {
                    const activeItem = navBar.children[active];
                    const scrollLeft = activeItem.offsetLeft - (navBar.clientWidth / 2) + (activeItem.clientWidth / 2);
                    navBar.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }

                // Desktop sidebar navigation auto-scrolling spy
                const sidebarNav = document.querySelector('.desktop-sidebar .custom-scroll');
                if (sidebarNav && sidebarNav.children[active]) {
                    sidebarNav.children[active].scrollIntoView({
                        behavior: 'smooth',
                        block: 'nearest'
                    });
                }
            }, [active]);

            const scrollToSection = (i) => {
                isManualScrolling.current = true;
                setActive(i);
                contentRef.current.scrollTo({ top: sectionRefs.current[i].offsetTop - 80, behavior: 'smooth' });
                setTimeout(() => { isManualScrolling.current = false; }, 850);
            };

            return (
                <div className={isEditing ? 'is-editing' : ''} style={{flex: 1, width: '100%', display: 'flex', position: 'relative', overflow: 'hidden'}}>
                    {/* Desktop Sidebar */}
                    <div className="no-print desktop-sidebar" style={{ width: '320px', borderRight: '1px solid #F0F0F0', background: '#fff', padding: '50px 32px', display: 'flex', flexDirection: 'column', gap: '32px' }}>
                        <h4 style={{fontSize: '11px', fontWeight: 700, color: '#CCC', letterSpacing: '2px', textTransform: 'uppercase'}}>內容導航</h4>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '8px', flex: 1, overflowY: 'auto'}} className="custom-scroll">
                            {data.sections.map((s, i) => (
                                <div key={i} onClick={() => scrollToSection(i)} style={{ fontSize: '14px', color: i === active ? 'var(--brand)' : '#888', fontWeight: i === active ? 700 : 400, cursor: 'pointer', padding: '14px 18px', borderRadius: '14px', background: i === active ? 'rgba(62, 92, 118, 0.05)' : 'transparent', transition: '0.3s' }}>{s.title}</div>
                            ))}
                        </div>
                        <div style={{marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: '12px'}}>
                            <button onClick={() => setIsEditing(!isEditing)} className={`glass-btn ${isEditing ? 'active' : ''}`} style={{width: '100%'}}>
                                {isEditing ? '✓ 完成編輯' : '✎ 編輯模式'}
                            </button>

                            {isEditing && (
                                <div style={{ display: 'flex', gap: '8px', width: '100%' }}>
                                    <button 
                                        onClick={handleUndo} 
                                        disabled={historyIndex === 0} 
                                        className="glass-btn" 
                                        style={{ 
                                            flex: 1, 
                                            padding: '10px', 
                                            fontSize: '12px', 
                                            opacity: historyIndex === 0 ? 0.4 : 1, 
                                            cursor: historyIndex === 0 ? 'not-allowed' : 'pointer' 
                                        }}
                                        title="復原上一步 (Ctrl+Z)"
                                    >
                                        ↩ 復原
                                    </button>
                                    <button 
                                        onClick={handleRedo} 
                                        disabled={historyIndex === history.length - 1} 
                                        className="glass-btn" 
                                        style={{ 
                                            flex: 1, 
                                            padding: '10px', 
                                            fontSize: '12px', 
                                            opacity: historyIndex === history.length - 1 ? 0.4 : 1, 
                                            cursor: historyIndex === history.length - 1 ? 'not-allowed' : 'pointer' 
                                        }}
                                        title="重做下一步 (Ctrl+Y)"
                                    >
                                        ↪ 重做
                                    </button>
                                </div>
                            )}

                            <button onClick={() => window.print()} className="glass-btn" style={{width: '100%'}}>🖨️ 列印 / PDF</button>
                            <button 
                                onClick={() => {
                                    navigator.clipboard.writeText(JSON.stringify({ sections: data.sections }, null, 4));
                                    alert('JSON 已複製！(包含目前的編輯狀態)');
                                }} 
                                className="glass-btn" 
                                style={{width: '100%'}}
                            >📋 複製 JSON</button>
                            <button onClick={onReset} className="glass-btn" style={{width: '100%'}}>← 返回修改</button>
                        </div>
                    </div>

                    {/* Mobile Floating Nav */}
                    <div className="mobile-nav-bar no-print">
                        {data.sections.map((s, i) => (
                            <div key={i} onClick={() => scrollToSection(i)} className={`mobile-nav-item ${i === active ? 'active' : ''}`}>{s.title}</div>
                        ))}
                    </div>
                    <div className="mobile-top-tools no-print">
                        <div onClick={onReset} className="glass-btn" style={{padding: '12px', borderRadius: '14px'}}>←</div>
                        <div onClick={() => {
                            navigator.clipboard.writeText(JSON.stringify({ sections: data.sections }, null, 4));
                            alert('JSON 已複製！');
                        }} className="glass-btn" style={{padding: '12px', borderRadius: '14px'}}>📋</div>
                        <div onClick={() => window.print()} className="glass-btn" style={{padding: '12px', borderRadius: '14px'}}>🖨️</div>
                    </div>

                    {/* Content Area */}
                    <div ref={contentRef} className="custom-scroll content-area" style={{ flex: 1, overflowY: 'auto', padding: '60px 80px', background: '#FDFDFD' }}>
                        {data.sections.map((s, i) => (
                            <div key={i} ref={el => sectionRefs.current[i] = el} className="section-anchor" style={{marginBottom: '100px', animation: 'fadeIn 0.8s ease-out'}}>
                                <h2 
                                    className="serif editable-field" 
                                    contentEditable={isEditing}
                                    onBlur={(e) => {
                                        const newS = {...s, title: e.target.innerText};
                                        updateSection(i, newS);
                                    }}
                                    style={{fontSize: '36px', color: 'var(--brand)', marginBottom: '32px'}}
                                >{s.title}</h2>
                                <AdaptiveContent 
                                    data={s.content} 
                                    isEditing={isEditing}
                                    onUpdate={(field, val) => {
                                        const newS = {
                                            ...s,
                                            content: typeof s.content === 'object' ? { ...s.content } : s.content
                                        };
                                        if (field === 'text') newS.content = val;
                                        else newS.content[field] = val;
                                        updateSection(i, newS);
                                    }}
                                />
                            </div>
                        ))}
                        <div className="no-print" style={{height: '200px'}} />
                    </div>
                </div>
            );
        }

        function InputStage({ onInject }) {
            const [inputText, setInputText] = useState(localStorage.getItem('lazy_input') || '');
            const [jsonText, setJsonText] = useState(localStorage.getItem('lazy_json') || '');

            useEffect(() => {
                localStorage.setItem('lazy_input', inputText);
                localStorage.setItem('lazy_json', jsonText);
            }, [inputText, jsonText]);

            const loadDemo = () => {
                setJsonText(JSON.stringify(demoData, null, 4));
                setInputText("這是一份由系統生成的『懶人報』範例原始素材。包含營運數據、增長趨勢、用戶偏好以及未來規劃藍圖。點擊右側『🚀 渲染智能報告』即可查看完整的高保真視覺效果！");
            };

            return (
                <div style={{padding: window.innerWidth < 768 ? '40px 24px' : '60px 80px', flex: 1, display: 'flex', flexDirection: 'column', gap: '32px', overflowY: 'auto', overflowX: 'hidden'}} className="custom-scroll">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '20px' }}>
                        <div>
                            <h1 className="serif" style={{fontSize: '48px', margin: 0, fontWeight: 400}}>下午好。</h1>
                            <p style={{color: '#888', marginTop: '8px'}}>準備好生成您的智能報告了嗎？</p>
                        </div>
                        <button onClick={loadDemo} className="glass-btn" style={{ fontSize: '13px', padding: '10px 18px', display: 'none' }}>
                            💡 載入高分感展示範例
                        </button>
                    </div>
                    
                    <div style={{display: 'flex', flexDirection: window.innerWidth < 768 ? 'column' : 'row', gap: '32px', flex: 1, minHeight: 0}}>
                        <div style={{flex: 1, display: 'flex', flexDirection: 'column', gap: '20px'}}>
                            <textarea value={inputText} onChange={e => setInputText(e.target.value)} style={{ flex: 1, border: '1px solid rgba(0,0,0,0.05)', borderRadius: '32px', padding: '32px', fontSize: '17px', outline: 'none', background: 'white', boxShadow: '0 10px 50px rgba(0,0,0,0.02)', lineHeight: 1.6, minHeight: '300px' }} placeholder="貼入原始素材..." />
                            <button onClick={() => { 
                                const prompt = `你是一位資深的「懶人報」內容架構師。
你的任務是將用戶提供的原始素材深度剖析，並轉化為結構化的 JSON 數據，以便在專屬網頁中完美渲染出極具專業美感與視覺張力的數據報告。

【輸出格式規範】
1. 必須僅輸出純 JSON 代碼塊（不要包含任何前導或後續的閒聊、Markdown 說明文字）。
2. 頂層結構必須包含 "sections" 陣列。
3. 每個 section 包含 "title" (標題字串) 和 "content" (內容物件)。

【Content 物件支持的關鍵組件】
- "text": 字串，用於該段落的敘述、脈絡、引言或圖表說明。重要：若下方附有圖表，請務必在此提供圖表的說明與洞察。
- "quote": 字串，用於核心洞察、亮點、結論或金句（會被渲染成優雅的引用框）。
- "author": 字串，與 quote 配套，標註說話者或來源。
- "metrics": 陣列，用於關鍵數據指標。格式：{ "label": "指標名稱", "value": "數值(如 85% 或 12,500)", "trend": "up|down|none" }。
- "linechart": 陣列，用於表現隨時間或順序增長/變化的趨勢折線圖。格式：{ "label": "節點名稱(如一月, Q1)", "value": 數值 }。
- "donutchart": 物件，用於表現各項目佔比或數據分佈的多分段比例條 (Stacked Distribution Bar)。格式：{ "totalLabel": "總計名目(如: 總樣本數、受訪者總數)", "unit": "單位(如: 人、次)", "items": [{ "label": "分類名稱", "value": 數值 }] }。
- "barchart": 陣列，用於橫向對比多個維度的指標或滿意度評分。格式：{ "label": "維度名稱", "value": 數值, "unit": "單位(如 % 或 分)" }。
- "gridcards": 陣列，用於多個核心戰略支柱、產品亮點或關鍵特點。格式：[{ "title": "特點標題", "desc": "特點詳細描述" }]。
- "comparison": 物件，用於新舊方案對比、優缺點分析或 before/after 對照。格式：
  {
    "leftTitle": "對照組/缺點/舊方案標題",
    "leftList": ["對照點 1", "對照點 2", "對照點 3"],
    "rightTitle": "本案/優點/新方案標題",
    "rightList": ["亮點點 1", "亮點點 2", "亮點點 3"]
  }
- "timeline": 陣列，用於表現時程里程碑、發展路徑、計畫步驟。格式：{ "time": "時間/階段", "event": "事件標題", "desc": "事件描述" }
- "checklist": 陣列，用於行動準備清單、待辦任務或優化項目。格式：{ "item": "清單項目描述", "checked": false } (預設請全部設為 false)
- "steps": 陣列，用於流程、因果或邏輯串聯步驟（與 timeline 類似但更輕量）。格式：{ "action": "行動步驟", "impact": "預期影響" }

【組件選用核心指南（極其重要）】
- 【時間序列、成長趨勢】：只要出現「逐月變化」、「季度對比」、「歷年趨勢」、「發展過程」，務必選用 "linechart" 來呈現動態折線。
- 【結構佔比、份額分配】：只要出現「份額」、「佔比」、「來源分佈」、「比率分配」，務必選用 "donutchart" 呈現為多分段比例條。
- 【多維度滿意度、多項目指標對比】：如對比「速度」、「品質」、「穩定度」，務必選用 "barchart"。
- 【前後對照、正反評估】：如對比「傳統方案 vs. 懶人報 AI 方案」或優劣分析，務必選用 "comparison" 呈現雙欄視覺。
- 【戰略支柱、核心價值點】：要將大段文章歸納為 3 個焦點卡片時，務必選用 "gridcards"。
- 【里程碑路徑、時間推進】：如「第一階段、第二階段」或「6月、7月、8月」的里程碑，務必選用 "timeline"。
- 【行動清單、檢查清單】：若有明確的行動方針或 Tasks，務必選用 "checklist"。

請根據以下原始素材，發揮你卓越的專業素養，進行最完美的結構化轉譯：

${inputText}`;
                                navigator.clipboard.writeText(prompt); 
                                alert('提示詞指令已完美複製！請將其貼給 AI 處理，並將生成的 JSON 貼到右側。'); 
                            }} className="glass-btn">📋 複製智能 AI 處理指令</button>
                        </div>
                        <div style={{width: window.innerWidth < 768 ? '100%' : '480px', display: 'flex', flexDirection: 'column', gap: '20px'}}>
                            <textarea value={jsonText} onChange={e => setJsonText(e.target.value)} style={{ flex: 1, background: '#F8F8F8', border: '1px dashed rgba(0,0,0,0.1)', borderRadius: '32px', padding: '28px', fontSize: '13px', fontFamily: 'monospace', outline: 'none', lineHeight: 1.5, minHeight: '300px' }} placeholder="貼入 AI 解析結果 (JSON)..." />
                            <button onClick={() => onInject(jsonText)} className="primary-btn">🚀 渲染智能報告</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [stage, setStage] = useState('input');
            const [data, setData] = useState(null);
            const handleInject = (str) => {
                try {
                    let parsed = JSON.parse(str);
                    if (!parsed.sections) parsed = { sections: [{ title: "智能分析報告", content: parsed }] };
                    setData(parsed); setStage('output');
                } catch (e) { alert('JSON 格式錯誤，請確認貼入完整的 JSON 代碼，並確保是標準格式。'); }
            };
            return (
                <div className="app-container" style={{ display: 'flex', flexDirection: 'column', background: '#fff', borderRadius: '32px', overflow: 'hidden', boxShadow: '0 60px 180px rgba(0,0,0,0.12)', width: '1380px', height: '920px', position: 'relative', maxWidth: '95vw', maxHeight: '92vh', margin: '40px auto' }}>
                    {stage === 'input' && <InputStage onInject={handleInject} />}
                    {stage === 'output' && <OutputStage data={data} onReset={() => setStage('input')} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
