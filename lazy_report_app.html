<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懶人報 — Premium AI 智能報告 (ScrollSpy 版)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F7F5F0; --ink: #1A1A1B; --brand: #3E5C76; --accent: #E8E2D6; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; background: var(--bg); color: var(--ink); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .serif { font-family: 'Newsreader', serif; }
        .generative-bg { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; 
            background: radial-gradient(circle at 10% 10%, rgba(168, 192, 255, 0.08) 0%, transparent 40%); 
            filter: blur(80px); 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 10px; }
        [contenteditable="true"]:focus { outline: none; background: rgba(62, 92, 118, 0.05); border-radius: 4px; }
        
        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { align-items: flex-start; }
            .app-container { width: 100vw !important; height: 100dvh !important; border-radius: 0 !important; }
            .sidebar { display: none !important; }
            .mobile-nav { display: flex !important; }
            .content-area { padding: 40px 24px !important; }
            .input-stage { padding: 40px 24px !important; }
            .input-grid { flex-direction: column !important; }
            .input-json { width: 100% !important; height: 200px !important; }
        }
    </style>
</head>
<body>
    <div class="generative-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Optimized Primitives ---
        function MetricGrid({ metrics, isEditing, updateMetric }) {
            return (
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', margin: '32px 0'}}>
                    {metrics.map((m, i) => (
                        <div key={i} style={{background: 'white', padding: '20px', borderRadius: '20px', border: '1px solid #EEE', textAlign: 'center', boxShadow: '0 4px 20px rgba(0,0,0,0.02)'}}>
                            <div contentEditable={isEditing} onBlur={(e) => updateMetric(i, 'label', e.target.innerText)} style={{fontSize: '10px', color: '#AAA', fontWeight: 700, letterSpacing: '1.5px', marginBottom: '8px', textTransform: 'uppercase'}}>{m.label}</div>
                            <div style={{fontSize: '24px', fontWeight: 600, color: m.trend === 'up' ? '#D9534F' : m.trend === 'down' ? '#5CB85C' : 'var(--brand)'}}>
                                <span contentEditable={isEditing} onBlur={(e) => updateMetric(i, 'value', e.target.innerText)}>{m.value}</span>
                                <span style={{fontSize: '14px', marginLeft: '4px'}}>{m.trend === 'up' ? '↑' : m.trend === 'down' ? '↓' : ''}</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function FlowStep({ steps, isEditing, onUpdate }) {
            return (
                <div style={{display: 'flex', flexDirection: 'column', gap: '12px', margin: '32px 0'}}>
                    {steps.map((s, i) => (
                        <div key={i} style={{display: 'flex', gap: '12px', alignItems: 'center'}}>
                            <div style={{width: '32px', height: '32px', background: 'var(--brand)', color: 'white', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, flexShrink: 0, fontSize: '14px'}}>{i+1}</div>
                            <div style={{flex: 1, background: 'white', padding: '16px 20px', borderRadius: '14px', border: '1px solid #EEE', fontSize: '15px'}}>
                                <span contentEditable={isEditing} onBlur={(e) => { const n = [...steps]; n[i].action = e.target.innerText; onUpdate(n); }} style={{fontWeight: 700, color: 'var(--brand)'}}>{s.action}</span>
                                <span style={{margin: '0 8px', color: '#DDD'}}>→</span>
                                <span contentEditable={isEditing} onBlur={(e) => { const n = [...steps]; n[i].impact = e.target.innerText; onUpdate(n); }} style={{color: '#555'}}>{s.impact}</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function AdaptiveContent({ data, isEditing, onUpdate }) {
            if (!data) return null;
            if (typeof data === 'string') return <p contentEditable={isEditing} onBlur={(e) => onUpdate(e.target.innerText)} style={{lineHeight: 1.8, fontSize: '17px', color: '#444', margin: '16px 0'}} dangerouslySetInnerHTML={{__html: data}} />;
            
            const updateField = (key, val) => { onUpdate({ ...data, [key]: val }); };

            return (
                <div style={{maxWidth: '100%', overflowX: 'hidden'}}>
                    {data.quote && (
                        <div style={{padding: '30px', background: 'rgba(62, 92, 118, 0.03)', borderRadius: '24px', borderLeft: '6px solid var(--brand)', margin: '32px 0'}}>
                            <div className="serif" contentEditable={isEditing} onBlur={(e) => updateField('quote', e.target.innerText)} style={{fontSize: '22px', fontStyle: 'italic', color: 'var(--brand)', lineHeight: 1.5}}>"{data.quote}"</div>
                            {data.author && <div contentEditable={isEditing} onBlur={(e) => updateField('author', e.target.innerText)} style={{marginTop: '16px', textAlign: 'right', fontSize: '14px', color: '#888', fontWeight: 600}}>— {data.author}</div>}
                        </div>
                    )}
                    {data.metrics && <MetricGrid metrics={data.metrics} isEditing={isEditing} updateMetric={(idx, key, val) => {
                        const newMetrics = [...data.metrics]; newMetrics[idx][key] = val; updateField('metrics', newMetrics);
                    }} />}
                    {data.steps && <FlowStep steps={data.steps} isEditing={isEditing} onUpdate={(v) => updateField('steps', v)} />}
                    {data.checklist && (
                        <div style={{display: 'flex', flexDirection: 'column', gap: '12px', margin: '32px 0'}}>
                            {data.checklist.map((item, i) => (
                                <div key={i} style={{display: 'flex', gap: '12px', alignItems: 'center', background: 'white', padding: '16px 20px', borderRadius: '12px', border: '1px solid #EEE'}}>
                                    <div style={{width: '20px', height: '20px', borderRadius: '50%', background: 'var(--brand)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '10px', flexShrink: 0}}>✓</div>
                                    <div contentEditable={isEditing} onBlur={(e) => { const n = [...data.checklist]; n[i] = e.target.innerText; updateField('checklist', n); }} style={{fontSize: '16px', color: '#444'}}>{item}</div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    {Object.entries(data).map(([key, value], i) => {
                        const reserved = ['quote', 'author', 'metrics', 'steps', 'checklist', 'type', 'title'];
                        if (reserved.includes(key)) return null;
                        return (
                            <div key={i} style={{marginTop: '24px'}}>
                                <div style={{fontSize: '11px', fontWeight: 800, color: 'var(--brand)', textTransform: 'uppercase', marginBottom: '8px', opacity: 0.6}}>{key}</div>
                                <AdaptiveContent data={value} isEditing={isEditing} onUpdate={(v) => updateField(key, v)} />
                            </div>
                        );
                    })}
                </div>
            );
        }

        function OutputStage({ data, setData, onReset }) {
            const [active, setActive] = useState(0);
            const [isEditing, setIsEditing] = useState(false);
            const contentRef = useRef(null);
            const navRef = useRef(null);
            const sectionRefs = useRef([]);
            const navItemRefs = useRef([]);
            const isManualScrolling = useRef(false);

            // --- Scroll Spy Logic ---
            useEffect(() => {
                const handleScroll = () => {
                    if (isManualScrolling.current) return;
                    const container = contentRef.current;
                    if (!container) return;
                    
                    const scrollPos = container.scrollTop + 150;
                    let currentIndex = 0;
                    for (let i = 0; i < sectionRefs.current.length; i++) {
                        if (sectionRefs.current[i] && scrollPos >= sectionRefs.current[i].offsetTop) {
                            currentIndex = i;
                        }
                    }
                    
                    if (currentIndex !== active) {
                        setActive(currentIndex);
                    }
                };

                const container = contentRef.current;
                container?.addEventListener('scroll', handleScroll);
                return () => container?.removeEventListener('scroll', handleScroll);
            }, [active]);

            // --- Auto-center Nav ---
            useEffect(() => {
                if (navRef.current && navItemRefs.current[active]) {
                    navItemRefs.current[active].scrollIntoView({
                        behavior: 'smooth',
                        block: 'nearest',
                        inline: 'center'
                    });
                }
            }, [active]);

            const scrollTo = (i) => {
                isManualScrolling.current = true;
                setActive(i);
                contentRef.current.scrollTo({ top: sectionRefs.current[i].offsetTop - 40, behavior: 'smooth' });
                setTimeout(() => { isManualScrolling.current = false; }, 800);
            };

            return (
                <div style={{height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative'}}>
                    <div style={{display: 'flex', flex: 1, overflow: 'hidden'}}>
                        {/* Sidebar Desktop */}
                        <div className="sidebar" style={{ width: '280px', borderRight: '1px solid #F0F0F0', background: '#fff', padding: '50px 24px', display: 'flex', flexDirection: 'column', gap: '32px' }}>
                            <div>
                                <h4 style={{fontSize: '10px', fontWeight: 700, color: '#CCC', letterSpacing: '2px', textTransform: 'uppercase', marginBottom: '16px'}}>內容導航</h4>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
                                    {data.sections.map((s, i) => (
                                        <div key={i} onClick={() => scrollTo(i)} style={{ fontSize: '14px', color: i === active ? 'var(--brand)' : '#888', fontWeight: i === active ? 700 : 400, cursor: 'pointer', padding: '12px 16px', borderRadius: '12px', background: i === active ? 'rgba(62, 92, 118, 0.05)' : 'transparent', borderLeft: i === active ? '4px solid var(--brand)' : '4px solid transparent', transition: 'all 0.3s' }}>
                                            {s.title}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div style={{marginTop: 'auto', borderTop: '1px solid #F5F5F5', paddingTop: '24px'}}>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px'}}>
                                    <span style={{fontSize: '13px', fontWeight: 600, color: '#666'}}>編輯模式</span>
                                    <div onClick={() => setIsEditing(!isEditing)} style={{ width: '40px', height: '22px', background: isEditing ? 'var(--brand)' : '#DDD', borderRadius: '20px', position: 'relative', cursor: 'pointer', transition: '0.3s' }}>
                                        <div style={{ width: '16px', height: '16px', background: 'white', borderRadius: '50%', position: 'absolute', top: '3px', left: isEditing ? '21px' : '3px', transition: '0.3s' }} />
                                    </div>
                                </div>
                                <button onClick={onReset} style={{width: '100%', background: '#f9f9f9', border: '1px solid #eee', padding: '12px', borderRadius: '10px', cursor: 'pointer', fontSize: '13px'}}>← 返回修改</button>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div ref={contentRef} className="custom-scroll content-area" style={{ flex: 1, overflowY: 'auto', padding: '80px 100px', background: '#FDFDFD', scrollBehavior: 'smooth' }}>
                            {data.sections.map((s, i) => (
                                <div key={i} ref={el => sectionRefs.current[i] = el} style={{marginBottom: '80px', animation: 'fadeIn 0.8s ease-out'}}>
                                    <h2 className="serif" contentEditable={isEditing} onBlur={(e) => { const n = [...data.sections]; n[i].title = e.target.innerText; setData({ ...data, sections: n }); }} style={{fontSize: '32px', color: 'var(--brand)', marginBottom: '32px', lineHeight: 1.3}}>{s.title}</h2>
                                    <AdaptiveContent data={s.content} isEditing={isEditing} onUpdate={(v) => { const n = [...data.sections]; n[i].content = v; setData({ ...data, sections: n }); }} />
                                </div>
                            ))}
                            <div style={{height: '300px'}} />
                        </div>
                    </div>

                    {/* Mobile Bottom Nav */}
                    <div className="mobile-nav" ref={navRef} style={{ display: 'none', position: 'absolute', bottom: 0, left: 0, right: 0, background: 'rgba(255,255,255,0.95)', backdropFilter: 'blur(10px)', borderTop: '1px solid #EEE', padding: '12px 16px', gap: '8px', overflowX: 'auto', scrollbarWidth: 'none', zIndex: 100 }}>
                        {data.sections.map((s, i) => (
                            <div key={i} ref={el => navItemRefs.current[i] = el} onClick={() => scrollTo(i)} style={{ flexShrink: 0, padding: '8px 16px', borderRadius: '20px', fontSize: '13px', fontWeight: i === active ? 700 : 500, color: i === active ? 'white' : '#888', background: i === active ? 'var(--brand)' : 'transparent', transition: 'all 0.3s' }}>
                                {s.title}
                            </div>
                        ))}
                        <div onClick={onReset} style={{ flexShrink: 0, padding: '8px 12px', borderRadius: '20px', fontSize: '13px', color: '#AAA', background: '#F5F5F5' }}>✕</div>
                    </div>
                </div>
            );
        }

        function InputStage({ onInject }) {
            const [inputText, setInputText] = useState('');
            const [jsonText, setJsonText] = useState('');
            return (
                <div className="input-stage" style={{padding: '60px 80px', height: '100%', display: 'flex', flexDirection: 'column', gap: '32px'}}>
                    <h1 className="serif" style={{fontSize: '42px', margin: 0, fontWeight: 400, lineHeight: 1.2}}>準備您的報告。</h1>
                    <div className="input-grid" style={{display: 'flex', gap: '32px', flex: 1, minHeight: 0}}>
                        <div style={{flex: 1, display: 'flex', flexDirection: 'column', gap: '12px'}}>
                            <textarea value={inputText} onChange={e => setInputText(e.target.value)} style={{ flex: 1, border: '1.5px solid #EEE', borderRadius: '24px', padding: '24px', fontSize: '16px', outline: 'none', background: '#FDFDFD' }} placeholder="貼入原始素材..." />
                            <button onClick={() => { const p = `將以下素材轉換成 JSON 格式...`; navigator.clipboard.writeText(p + "\n\n" + inputText); alert('指令已複製！'); }} style={{ background: '#f5f5f5', border: '1px solid #ddd', padding: '14px', borderRadius: '12px', cursor: 'pointer', fontWeight: 600, fontSize: '14px' }}>📋 複製 AI 處理指令</button>
                        </div>
                        <div className="input-json" style={{width: '400px', display: 'flex', flexDirection: 'column', gap: '12px'}}>
                            <textarea value={jsonText} onChange={e => setJsonText(e.target.value)} style={{ flex: 1, background: '#f9f9f9', border: '1.5px dashed #CCC', borderRadius: '24px', padding: '20px', fontSize: '12px', fontFamily: 'monospace', outline: 'none' }} placeholder="貼入 AI 解析結果..." />
                            <button onClick={() => onInject(jsonText)} style={{ background: 'var(--brand)', color: 'white', border: 'none', padding: '16px', borderRadius: '16px', cursor: 'pointer', fontWeight: 700, boxShadow: '0 10px 30px rgba(62, 92, 118, 0.15)', fontSize: '16px' }}>🚀 渲染報告</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [stage, setStage] = useState('input');
            const [data, setData] = useState(null);
            const handleInject = (str) => {
                try {
                    let parsed = JSON.parse(str);
                    if (!parsed.sections) parsed = { sections: [{ title: "智能分析報告", content: parsed }] };
                    setData(parsed); setStage('output');
                } catch (e) { alert('JSON 格式錯誤'); }
            };
            return (
                <div className="app-container" style={{ display: 'flex', flexDirection: 'column', background: '#fff', borderRadius: '24px', overflow: 'hidden', boxShadow: '0 50px 150px rgba(0,0,0,0.12)', width: '1350px', height: '900px', position: 'relative' }}>
                    {stage === 'input' && <InputStage onInject={handleInject} />}
                    {stage === 'output' && <OutputStage data={data} setData={setData} onReset={() => setStage('input')} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
